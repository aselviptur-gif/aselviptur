<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Rezervasyon - Asel VIP Tur</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* Sadece bu sayfaya özel ufak düzeltmeler (gerekirse) */
        .vip-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .vip-select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div style="padding: 20px; text-align: left;">
        <a href="index.html" style="text-decoration: none; color: #d4af37; font-weight: bold; font-size: 16px;">&larr; Ana Sayfaya Dön</a>
    </div>

    <section id="rezervasyon" class="section alt-bg">
        <h2 class="section-title" data-i18n="form-title">VIP Rezervasyon</h2>
        <div class="contact-container" style="max-width: 600px; margin: 0 auto; padding: 20px;">
            <form action="https://formspree.io/f/xojpyzyl" method="POST" class="vip-form">                
                
                <div class="input-group">
                    <input type="text" name="Ad_Soyad" placeholder="Adınız Soyadınız" required class="vip-input">
                    <input type="tel" name="Telefon" placeholder="Telefon Numaranız" required class="vip-input">
                </div>

                <div class="input-group">
                    <input type="text" name="Alinis_Noktasi" placeholder="Nereden Alınacaksınız?" required class="vip-input">
                    <input type="text" name="Varis_Noktasi" placeholder="Nereye Gideceksiniz?" required class="vip-input">
                </div>

                <div class="input-group">
                    <select name="music" class="vip-select">
                        <option value="" disabled selected>🎵 Araç İçi Müzik Tercihi</option>
                        <option value="jazz">Caz & Blues</option>
                        <option value="classical">Klasik Müzik</option>
                        <option value="pop">Popüler / Güncel</option>
                        <option value="silent">Sessiz Sürüş (Silent Ride)</option>
                    </select>
                </div>
                <div class="input-group">
                    <select name="scent" class="vip-select">
                        <option value="" disabled selected>🕯️ Araç Kokusu Tercihi</option>
                        <option value="ocean">Okyanus Ferahlığı</option>
                        <option value="woody">Odunsu & Deri (Vip)</option>
                        <option value="vanilla">Vanilya & Çikolata</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn" style="width: 100%; padding: 15px; background-color: #d4af37; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; font-size: 16px;">Talebi Gönder</button>
            </form>
        </div>
    </section>

</body>
</html>
